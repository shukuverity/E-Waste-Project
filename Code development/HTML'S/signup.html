<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up | E-waste Platform</title>
	<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
<main class="container">
	<div class="card" style="max-width: 700px; margin: auto;">
		<h1>Create Account</h1>

		<form id="signup-form" method="post" action="#" aria-label="Sign up form">
			<div class="grid-container">
				<div>
					<label for="full-name">Full Name</label>
					<input id="full-name" name="fullName" type="text" placeholder="Enter full name" required>
				</div>

				<div>
					<label for="email">Email Address</label>
					<input id="email" name="email" type="email" placeholder="Enter email" required>
				</div>
				
				<div>
					<label for="phone">Phone Number</label>
					<input id="phone" name="phoneNumber" type="tel" placeholder="Enter phone number" required>
				</div>
						
				<div>
					<label for="role">Role</label>
					<select id="role" name="role" required>
						<option>User</option>
						<option>Recycler</option>
						<option>Admin Personnel</option>
					</select>
				</div>

				<div>
					<label for="password">Password</label>
					<input id="password" name="password" type="password" placeholder="Create password" required>
				</div>

				<div>
					<label for="confirm-password">Confirm Password</label>
					<input id="confirm-password" name="confirmPassword" type="password" placeholder="Confirm password" required>
					<small id="signup-error" style="display: none; color: #b00020; margin-top: 6px;">Passwords do not match.</small>
				</div>
			</div>
					
			<button class="btn" type="submit" style="width: 100%; margin-top: 10px;">Create Account</button>
		
		</form>
	</div>
</main>
<script>
	(function () {
		const signupForm = document.getElementById("signup-form");
		const passwordInput = document.getElementById("password");
		const confirmPasswordInput = document.getElementById("confirm-password");
		const errorText = document.getElementById("signup-error");

		if (!signupForm || !passwordInput || !confirmPasswordInput || !errorText) {
			return;
		}

		signupForm.addEventListener("submit", function (event) {
			event.preventDefault();

			if (passwordInput.value !== confirmPasswordInput.value) {
				errorText.style.display = "block";
				confirmPasswordInput.focus();
				return;
			}

			errorText.style.display = "none";
			window.location.href = "login.html";
		});
	})();
</script>
</body>
</html>
