<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up | E-waste Platform</title>
	<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
<main class="container">
	<div class="card" style="max-width: 700px; margin: auto;">
		<h1>Create Account</h1>

		<form id="signup-form" method="post" action="#" aria-label="Sign up form">
			<div class="grid-container">
				<div>
					<label for="full-name">Full Name</label>
					<input id="full-name" name="fullName" type="text" placeholder="Enter full name" required>
				</div>

				<div>
					<label for="email">Email Address</label>
					<input id="email" name="email" type="email" placeholder="Enter email" required>
				</div>
				
				<div>
					<label for="phone">Phone Number</label>
					<input id="phone" name="phoneNumber" type="tel" placeholder="Enter 10-digit phone number" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required>
				</div>
						
				<div>
					<label for="role">Role</label>
					<select id="role" name="role" required>
						<option>User</option>
						<option>Recycler</option>
						<option>Admin Personnel</option>
					</select>
				</div>

				<div>
					<label for="password">Password</label>
					<input id="password" name="password" type="password" placeholder="Create password" required>
				</div>

				<div>
					<label for="confirm-password">Confirm Password</label>
					<input id="confirm-password" name="confirmPassword" type="password" placeholder="Confirm password" required>
					<small id="signup-error" style="display: none; color: #b00020; margin-top: 6px;">Passwords do not match.</small>
				</div>
			</div>
					
			<button class="btn" type="submit" style="width: 100%; margin-top: 10px;">Create Account</button>
		
		</form>
	</div>
</main>
<script>
	(function () {
		const signupForm = document.getElementById("signup-form");
		const fullNameInput = document.getElementById("full-name");
		const emailInput = document.getElementById("email");
		const phoneInput = document.getElementById("phone");
		const roleInput = document.getElementById("role");
		const passwordInput = document.getElementById("password");
		const confirmPasswordInput = document.getElementById("confirm-password");
		const errorText = document.getElementById("signup-error");

		if (!signupForm || !fullNameInput || !emailInput || !phoneInput || !roleInput || !passwordInput || !confirmPasswordInput || !errorText) {
			return;
		}

		function getAccounts() {
			const rawAccounts = localStorage.getItem("ewaste_accounts");
			if (!rawAccounts) {
				return [];
			}

			try {
				const parsed = JSON.parse(rawAccounts);
				return Array.isArray(parsed) ? parsed : [];
			} catch (error) {
				return [];
			}
		}

		function saveAccounts(accounts) {
			localStorage.setItem("ewaste_accounts", JSON.stringify(accounts));
		}

		signupForm.addEventListener("submit", function (event) {
			event.preventDefault();
			errorText.style.display = "none";
			errorText.textContent = "Passwords do not match.";

			const sanitizedPhone = phoneInput.value.replace(/\D/g, "").slice(0, 10);
			phoneInput.value = sanitizedPhone;

			if (sanitizedPhone.length !== 10) {
				errorText.textContent = "Phone number must be exactly 10 digits.";
				errorText.style.display = "block";
				phoneInput.focus();
				return;
			}

			if (passwordInput.value !== confirmPasswordInput.value) {
				errorText.style.display = "block";
				confirmPasswordInput.focus();
				return;
			}

			const email = emailInput.value.trim().toLowerCase();
			const accounts = getAccounts();
			const existingAccount = accounts.find(function (account) {
				return account.email === email;
			});

			if (existingAccount) {
				errorText.textContent = "An account with this email already exists.";
				errorText.style.display = "block";
				emailInput.focus();
				return;
			}

			accounts.push({
				fullName: fullNameInput.value.trim(),
				email: email,
				phoneNumber: sanitizedPhone,
				role: roleInput.value,
				password: passwordInput.value,
				pointsBalance: 0,
				totalPointsEarned: 0,
				totalPointsRedeemed: 0
			});

			saveAccounts(accounts);
			window.location.href = "login.html";
		});

		phoneInput.addEventListener("input", function () {
			const onlyDigits = phoneInput.value.replace(/\D/g, "").slice(0, 10);
			if (phoneInput.value !== onlyDigits) {
				phoneInput.value = onlyDigits;
			}
		});
	})();
</script>
</body>
</html>
