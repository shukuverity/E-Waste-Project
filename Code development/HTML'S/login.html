<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | E-waste Platform</title>
	<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
<main class="container">
<div class="card" style="max-width: 600px; margin: auto;">
	<h2>Welcome Back</h2>

	<form id="login-form" method="post" action="#" aria-label="Login form">
		<div style="margin-bottom: 20px;">
			<label for="login-email">Email Address</label>
			<input id="login-email" name="email" type="email" placeholder="Enter your email" required>
		</div>

		<div style="margin-bottom: 20px;">
			<label for="login-password">Password</label>
			<input id="login-password" name="password" type="password" placeholder="Enter password" required>
			<small id="login-error" style="display: none; color: #b00020; margin-top: 6px;">Invalid email or password.</small>
		</div>

		<button class="btn" type="submit" style="width: 100%;">Login</button>
	</form>

	<p style="margin-top: 20px;">No account? <a href="signup.html">Sign up</a></p>
</div>
</main>
<script>
	(function () {
		const loginForm = document.getElementById("login-form");
		const emailInput = document.getElementById("login-email");
		const passwordInput = document.getElementById("login-password");
		const errorText = document.getElementById("login-error");

		if (!loginForm || !emailInput || !passwordInput || !errorText) {
			return;
		}

		function getAccounts() {
			const rawAccounts = localStorage.getItem("ewaste_accounts");
			if (!rawAccounts) {
				return [];
			}

			try {
				const parsed = JSON.parse(rawAccounts);
				return Array.isArray(parsed) ? parsed : [];
			} catch (error) {
				return [];
			}
		}

		loginForm.addEventListener("submit", function (event) {
			event.preventDefault();
			errorText.style.display = "none";

			const email = emailInput.value.trim().toLowerCase();
			const password = passwordInput.value;
			const account = getAccounts().find(function (item) {
				return item.email === email;
			});

			if (!account || account.password !== password) {
				errorText.style.display = "block";
				passwordInput.focus();
				return;
			}

			localStorage.setItem("ewaste_current_user", JSON.stringify(account));

			if (account.role === "Admin Personnel") {
				window.location.href = "admin.html";
				return;
			}

			if (account.role === "Recycler") {
				window.location.href = "recycler.html";
				return;
			}

			window.location.href = "dashboard.html";
		});
	})();
</script>
</body>
</html>
