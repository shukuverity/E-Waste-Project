<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | E-waste Platform</title>
	<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
	<section class="landing-login-section">
		<div class="dashboard-content landing-login-card">
			<div class="panel-header admin-panel-header">
				<h2>Welcome Back</h2>
			</div>

			<form action="#" method="post">
				<div class="form-row">
					<div class="item-type">
						<label for="email">Email Address</label>
						<input type="email" id="email" name="email" placeholder="Enter email" required>
					</div>
				</div>

				<div class="form-row">
					<div class="item-type">
						<label for="password">Password</label>
						<input type="password" id="password" name="password" placeholder="Enter password" required>
					</div>
				</div>

				<button class="submit-btn" type="submit">Login</button>
			</form>

			<p class="landing-login-note">No account? <a href="signup.html">Sign up</a></p>
		</div>
	</section>
</body>
</html>
